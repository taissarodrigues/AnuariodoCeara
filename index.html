<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Anuário do Ceará</title>

  <!-- Fonte -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="./src/css/main.css">
</head>

<body>
  <!-- HEADER -->
  <header>
    <!-- TOPBAR -->
    <div class="topbar">
      <img src="/assets/icons/menu.png" class="menu-button" alt="Menu">
      <img src="/assets/img/logo-anuario.svg" class="logo" alt="Logo Anuário">
      <img src="/assets/icons/lupa.svg" class="search-button" alt="Buscar">
    </div>

    <!-- NAVBAR -->
    <nav class="custom-navbar" aria-label="Navegação principal">
      <h2 class="text-medium">Fortaleza</h2>

      <ul class="nav-list">
        <li><a href="#">Fortaleza em Síntese</a></li>
        <li><a href="#">Contribuintes ISS (2021)</a></li>
        <li><a href="#">Prefeitura</a></li>
        <li><a class="active" href="#" aria-current="page">Mapas</a></li>
        <li><a href="#">Organograma</a></li>
      </ul>
    </nav>
  </header>

  <!-- MAIN -->
  <main>
    <!-- BREADCRUMB -->
    <nav class="maps-breadcrumb" aria-label="breadcrumb">
      <div class="container">
    <div class="maps-inner">
          <ol class="breadcrumb">
          <li class="breadcrumb-item text-small font-regular"><a href="#">Início</a></li>
          <li class="breadcrumb-item text-small font-regular"><a href="#">Fortaleza</a></li>
          <li class="breadcrumb-item active text-small font-regular" aria-current="page">Mapas</li>
        </ol>
    </div>
      </div>
    </nav>

    <!-- TÍTULO -->
    <section class="page-header">
      <div class="container">
            <div class="maps-inner">


        <h1 class="title-large">Mapas</h1>
            <div class="maps-inner">

      
      </div>
    </section>

    <!-- CONTEÚDO -->
    <section class="maps-content">
      <div class="container">
            <div class="maps-inner">

        <div class="accordion" id="accordionExample">
          <div class="accordion-item">
            <h2 class="accordion-header" id="headingOne">
              <button
                class="accordion-button"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#collapseOne"
                aria-expanded="true"
                aria-controls="collapseOne"
              >
                Territórios Administrativos de Fortaleza
              </button>
            </h2>
            <div
              id="collapseOne"
              class="accordion-collapse collapse show"
              aria-labelledby="headingOne"
              data-bs-parent="#accordionExample"
            >
              <div class="accordion-body">
            <img src="/assets/img/6-TERRITORIOS-ADM.jpg" class="img-fluid mt-3" 
            alt="Mapa dos Territórios Administrativos de Fortaleza">              
              </div>
            </div>
          </div>

          <div class="accordion-item">
            <h2 class="accordion-header" id="headingTwo">
              <button
                class="accordion-button collapsed"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#collapseTwo"
                aria-expanded="false"
                aria-controls="collapseTwo"
              >
                Região Metropolitana de Fortaleza
              </button>
            </h2>
            <div
              id="collapseTwo"
              class="accordion-collapse collapse"
              aria-labelledby="headingTwo"
              data-bs-parent="#accordionExample"
            >
              <div class="accordion-body">
            <img src="/assets/img/5-REGIAO-METROPOLITANA-DE-FORTALEZA-1.jpg" class="img-fluid mt-3" 
            alt="Mapa da Região Metropolitana de Fortaleza">              
              </div>
            </div>
          </div>

          <div class="accordion-item">
            <h2 class="accordion-header" id="headingThree">
              <button
                class="accordion-button collapsed"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#collapseThree"
                aria-expanded="false"
                aria-controls="collapseThree"
              >
                Índice de Cobertura de Esgoto de Fortaleza
              </button>
            </h2>
            <div
              id="collapseThree"
              class="accordion-collapse collapse"
              aria-labelledby="headingThree"
              data-bs-parent="#accordionExample"
            >
              <div class="accordion-body">
            <img src="/assets/img/4-INDICE-DE-COBERTURA-DE-ESGOTO-DE-FORTALEZA-1.jpg" class="img-fluid mt-3" 
            alt="Mapa do Índice de Cobertura de Esgoto de Fortaleza">               
          </div>
            </div>
          </div>

          <div class="accordion-item">
            <h2 class="accordion-header" id="headingFour">
              <button
                class="accordion-button collapsed"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#collapseFour"
                aria-expanded="false"
                aria-controls="collapseFour"
              >
                Faixas Exclusivas de Fortaleza

              </button>
            </h2>
            <div
              id="collapseFour"
              class="accordion-collapse collapse"
              aria-labelledby="headingFour"
              data-bs-parent="#accordionExample"
            >
              <div class="accordion-body">
              <img src="/assets/img/3-FAIXAS-EXCLUSIVAS-DE-FORTALEZA.jpg" class="img-fluid mt-3" 
            alt="Mapa das Faixas Exclusivas de Fortaleza"> 
          </div>
            </div>
          </div>

          <div class="accordion-item">
            <h2 class="accordion-header" id="headingFive">
              <button
                class="accordion-button collapsed"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#collapseFive"
                aria-expanded="false"
                aria-controls="collapseFive"
              >
                Divisão das Regionais de Fortaleza
              </button>
            </h2>
            <div
              id="collapseFive"
              class="accordion-collapse collapse"
              aria-labelledby="headingFive"
              data-bs-parent="#accordionExample"
            >
              <div class="accordion-body">
          <img src="/assets/img/2-DIVISAO-DAS-REGIONAIS-DE-FORTALEZA-1.jpg" class="img-fluid mt-3" 
            alt="Mapa da Divisão das Regionais de Fortaleza">               </div>
            </div>
          </div>

          <div class="accordion-item">
            <h2 class="accordion-header" id="headingSix">
              <button
                class="accordion-button collapsed"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#collapseSix"
                aria-expanded="false"
                aria-controls="collapseSix"
              >
                Áreas Integradas de Segurança (AIS) da Capital
              </button>
            </h2>
            <div
              id="collapseSix"
              class="accordion-collapse collapse"
              aria-labelledby="headingSix"
              data-bs-parent="#accordionExample"
            >
              <div class="accordion-body">
        <img src="/assets/img/1-AIS-DE-FORTALEZA-1.jpg" class="img-fluid mt-3" 
            alt="Mapa das Áreas Integradas de Segurança (AIS) da Capital">               </div>
            </div>
          </div>
        </div>
      </div>
          <div class="maps-inner">

    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
